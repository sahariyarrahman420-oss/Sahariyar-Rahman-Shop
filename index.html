<!DOCTYPE html>
<html class="dark" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sahariyar Rahman Shop Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <style>
        body {
            background-color: #101417;
            color: #e0e2e8;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(28, 32, 36, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @media (min-width: 768px) {
            .glass-card:hover {
                background: rgba(50, 53, 57, 0.6);
                border: 1px solid rgba(233, 196, 0, 0.3);
                transform: translateY(-8px);
            }
        }
        .gold-glow {
            box-shadow: 0 0 40px -10px rgba(233, 196, 0, 0.2);
        }
        .inner-glow {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }
        .bg-mesh {
            background-image: radial-gradient(at 0% 0%, rgba(233, 196, 0, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(112, 93, 0, 0.05) 0px, transparent 50%);
        }
        .material-symbols-outlined {
            font-variable-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "secondary": "#c6c6cf",
          "secondary-fixed-dim": "#c6c6cf",
          "surface-tint": "#e9c400",
          "on-surface": "#e0e2e8",
          "primary": "#eff6df",
          "on-error": "#690005",
          "on-tertiary-container": "#a5c5f67",
          "inverse-primary": "#705d00",
          "surface-container-highest": "#323539",
          "on-tertiary-fixed": "#191c22",
          "on-secondary-container": "#0b4b4bd",
          "tertiary-fixed-dim": "#e0e2ec",
          "surface-container-high": "#272a2e",
          "surface-container-low": "#181c20",
          "on-surface-variant": "#d0c6ab",
          "on-background": "#e0e2e8",
          "surface-bright": "#36393e",
          "primary-fixed-dim": "#e9c400",
          "surface-container-lowest": "#0b0f12",
          "background": "#101417",
          "inverse-surface": "#e0e2e8",
          "on-error-container": "#ffdad6",
          "inverse-on-surface": "#2d3135",
          "primary-fixed": "#ffe16d",
          "on-secondary-fixed": "#191b22",
          "tertiary": "#w2d303b",
          "surface-container": "#1c2024",
          "on-tertiary-fixed-variant": "#44474f",
          "on-primary-fixed": "#221b00",
          "tertiary-container": "#d8d9e3",
          "on-secondary": "#2e3037",
          "tertiary-fixed-dim": "#c4c6d0",
          "tertiary": "#f5f5ff",
          "secondary-container": "#45464e",
          "outline-variant": "#4d4733"
        }
      }
    }
  }
</script>
</head>
<body class="bg-mesh min-h-screen flex flex-col justify-between font-sans selection:bg-yellow-400 selection:text-black">
    <header class="w-full px-6 py-4 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-yellow-500 text-3xl">storefront</span>
            <span class="text-xl font-semibold tracking-wider font-serif bg-gradient-to-r from-yellow-400 to-yellow-100 bg-clip-text text-transparent">SR PORTAL</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-4 py-12 max-w-4xl mx-auto text-center">
        <div class="glass-card inner-glow gold-glow p-8 md:p-12 rounded-3xl max-w-2xl w-full relative overflow-hidden backdrop-blur-md">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-yellow-500/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-yellow-600/10 rounded-full blur-3xl"></div>
            
            <h1 class="text-4xl md:text-6xl font-normal font-serif mb-6 leading-tight tracking-tight">
                Welcome to <br/>
                <span class="bg-gradient-to-r from-yellow-400 via-amber-200 to-yellow-500 bg-clip-text text-transparent font-medium">Sahariyar Rahman Shop</span>
            </h1>
            <p class="text-gray-400 text-base md:text-lg mb-10 max-w-md mx-auto font-light leading-relaxed">
                Explore premium accounts, customized tools, and digital solutions tailored to your preference.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="shop.html" class="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-black font-medium rounded-xl shadow-lg shadow-yellow-900/20 transition-all duration-300 flex items-center justify-center gap-2 group transform active:scale-95">
                    <span>Visit Public Shop</span>
                    <span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1">arrow_forward</span>
                </a>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-6 text-xs text-gray-500 tracking-widest max-w-7xl mx-auto border-t border-gray-900/50">
        © 2026 SAHARIYAR RAHMAN. ALL RIGHTS RESERVED.
    </footer>
</body></html>
